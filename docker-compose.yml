version: '3.8'

services:
  proof-server:
    image: midnightnetwork/proof-server:8.0.3
    container_name: midnight-proof-server
    ports:
      - "6300:6300"
    environment:
      - RUST_BACKTRACE=full
      - RUST_LOG=trace
    entrypoint:
      - "midnight-proof-server"
      - "--network"
      - "preprod"
      - "--verbose"
    restart: unless-stopped
