name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'contract/package-lock.json'
        
    - name: Install dependencies
      run: cd contract && npm install
      
    - name: Install Midnight Compact Compiler
      run: |
        curl -L -o compact.tar.xz https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-x86_64-unknown-linux-musl.tar.xz
        tar xf compact.tar.xz
        sudo mv compact-x86_64-unknown-linux-musl/compact /usr/local/bin/
        compact update
        compact --version

    - name: Build Contracts
      run: cd contract && npm run build:compact
      
    - name: Run Tests
      run: cd contract && npm test

    - name: Install Frontend dependencies
      run: cd frontend && npm install
      
    - name: Build Frontend
      run: cd frontend && npm run build

    - name: Upload Build Artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: './frontend/dist'

  deploy-frontend:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Ready for Deployment
        run: echo "Build artifact generated and ready for manual/automatic deployment."
