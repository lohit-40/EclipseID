services:
  - type: web
    name: eclipse-id-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 8080
      - key: RENDER_EXTERNAL_URL
        value: https://eclipse-id-backend.onrender.com
